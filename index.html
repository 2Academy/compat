<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fdf6ee">
<title>Тест на совместимость</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Caveat:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ee;
    --ink: #1c1917;
    --warm: #c2410c;
    --rose: #be185d;
    --cream: #f5e9d7;
    --paper: #fff9f0;
    --muted: #78716c;
    --green: #15803d;
    --amber: #b45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { -webkit-font-smoothing: antialiased; }
  body {
    font-family: "Cormorant Garamond", Georgia, serif;
    background: var(--bg);
    background-image:
      radial-gradient(at 15% 20%, var(--cream) 0%, transparent 50%),
      radial-gradient(at 85% 80%, #fce7e7 0%, transparent 50%);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px;
    line-height: 1.4;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .sans { font-family: "DM Sans", system-ui, sans-serif; }
  .hand { font-family: "Caveat", cursive; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input { font-family: inherit; }
  .title-block { text-align: center; margin-bottom: 32px; }
  .title-block .hand { color: var(--rose); font-size: 28px; margin-bottom: -8px; }
  .title-block h1 { font-size: clamp(36px, 7vw, 56px); font-weight: 600; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 12px; }
  .title-block p { color: var(--muted); font-size: 15px; line-height: 1.6; }
  .card { background: var(--paper); border: 1px solid var(--cream); border-radius: 20px; padding: 28px; box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 20px 40px -20px rgba(120,80,40,0.15); margin-bottom: 16px; }
  .card.dark { background: var(--ink); color: var(--bg); border: none; }
  .card.dark .muted-text { color: #a8a29e; }
  .btn-primary { background: var(--ink); color: var(--bg); border-radius: 999px; padding: 14px 28px; font-size: 15px; font-weight: 500; letter-spacing: 0.02em; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.15s, opacity 0.15s; font-family: "DM Sans", sans-serif; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { background: #d6d3d1; opacity: 0.5; cursor: not-allowed; }
  .btn-primary.full { width: 100%; }
  .btn-outline { background: transparent; border: 1px solid var(--ink); color: var(--ink); border-radius: 999px; padding: 13px 28px; font-size: 15px; font-family: "DM Sans", sans-serif; width: 100%; transition: background 0.15s; }
  .btn-outline:hover { background: var(--cream); }
  .btn-back { color: var(--muted); padding: 12px 4px; font-size: 14px; font-family: "DM Sans", sans-serif; }
  .btn-pill { background: var(--cream); padding: 10px 20px; border-radius: 999px; font-size: 14px; font-family: "DM Sans", sans-serif; display: inline-flex; align-items: center; gap: 6px; color: var(--ink); transition: background 0.15s; }
  .btn-pill:hover { background: #ecd9c0; }
  .input-label { font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  .input-field { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid var(--cream); border-radius: 12px; background: var(--bg); margin-bottom: 16px; outline: none; font-family: "DM Sans", sans-serif; transition: border-color 0.15s; }
  .input-field:focus { border-color: var(--ink); }
  .input-code { font-size: 20px; letter-spacing: 0.3em; text-align: center; font-weight: 600; text-transform: uppercase; }
  .progress-bar { height: 3px; background: var(--cream); border-radius: 2px; overflow: hidden; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: var(--ink); transition: width 0.4s ease; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; font-family: "DM Sans", sans-serif; }
  .sphere-tag { font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .question-card .hand { color: var(--rose); font-size: 22px; margin-bottom: 4px; }
  .question-text { font-size: 26px; font-weight: 500; line-height: 1.25; margin-bottom: 28px; letter-spacing: -0.01em; }
  .scale { display: flex; gap: 8px; justify-content: space-between; }
  .scale-btn { flex: 1; aspect-ratio: 1; background: var(--bg); color: var(--ink); border: 1px solid var(--cream); border-radius: 14px; font-size: 18px; font-weight: 600; transition: all 0.15s; font-family: "DM Sans", sans-serif; }
  .scale-btn:hover { border-color: var(--ink); }
  .scale-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .scale-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 12px; font-family: "DM Sans", sans-serif; }
  .choice-list { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn { text-align: left; background: var(--bg); color: var(--ink); border: 1px solid var(--cream); border-radius: 14px; padding: 14px 18px; font-size: 15px; line-height: 1.4; transition: all 0.15s; font-family: "DM Sans", sans-serif; }
  .choice-btn:hover { border-color: var(--ink); }
  .choice-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .code-display { text-align: center; }
  .code-display .label { font-family: "DM Sans", sans-serif; color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .code-display .code { font-size: 56px; font-weight: 600; letter-spacing: 0.15em; color: var(--warm); margin-bottom: 16px; }
  .divider { height: 1px; background: var(--cream); margin: 28px 0; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--cream); border-top-color: var(--warm); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .results-title { text-align: center; margin-bottom: 32px; }
  .results-title .hand { color: var(--rose); font-size: 28px; margin-bottom: -8px; }
  .results-title h1 { font-size: clamp(28px, 5vw, 40px); font-weight: 600; letter-spacing: -0.02em; }
  .overall-card { text-align: center; position: relative; overflow: hidden; }
  .overall-card::before { content: ""; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; background: radial-gradient(rgba(190, 24, 93, 0.13), transparent 70%); border-radius: 50%; pointer-events: none; }
  .overall-meta { font-family: "DM Sans", sans-serif; font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .overall-number { font-size: 96px; font-weight: 600; line-height: 1; color: var(--ink); letter-spacing: -0.04em; margin: 8px 0; }
  .overall-number .pct { font-size: 48px; color: var(--muted); }
  .verdict { font-family: "DM Sans", sans-serif; font-weight: 600; font-size: 15px; }
  .section-h { font-size: 22px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .section-sub { font-family: "DM Sans", sans-serif; color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .sphere-row { margin-bottom: 14px; }
  .sphere-row .meta { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; font-family: "DM Sans", sans-serif; }
  .sphere-row .name { font-weight: 600; }
  .sphere-row .pct { font-weight: 600; }
  .sphere-row .bar { height: 6px; background: var(--cream); border-radius: 3px; overflow: hidden; }
  .sphere-row .fill { height: 100%; border-radius: 3px; transition: width 1s ease-out; }
  .item-list { padding-left: 20px; line-height: 1.6; }
  .item-list li { margin-bottom: 8px; font-size: 16px; }
  .item-sphere { font-family: "DM Sans", sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px; }
  .gap-item { margin-bottom: 14px; font-size: 16px; }
  .gap-text { margin-bottom: 6px; }
  .gap-answers { font-family: "DM Sans", sans-serif; font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 2px; }
  .gap-answers b { color: var(--ink); }
  .rec-item { margin-bottom: 18px; padding-left: 14px; border-left: 2px solid; }
  .rec-sphere { font-family: "DM Sans", sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-weight: 600; }
  .rec-text { font-size: 16px; line-height: 1.5; }
  .footer-action { text-align: center; margin-top: 24px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.5s ease-out both; }
  .hidden { display: none !important; }
  .error-msg { color: var(--rose); font-family: "DM Sans", sans-serif; font-size: 13px; margin-top: -10px; margin-bottom: 12px; }
  .c-values { color: #c2410c; }
  .c-household { color: #a16207; }
  .c-finances { color: #15803d; }
  .c-intimacy { color: #be185d; }
  .c-communication { color: #1d4ed8; }
  .c-emotional { color: #7c2d92; }
  .c-family { color: #b45309; }
  .c-autonomy { color: #0f766e; }
  .c-leisure { color: #7c3aed; }
  .icon { display: inline-block; vertical-align: middle; }
  .disclaimer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; font-family: "DM Sans", sans-serif; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const API_BASE = "https://jsonblob.com/api/jsonBlob";

async function createBlob(data) {
  const res = await fetch(API_BASE, { method: "POST", headers: { "Content-Type": "application/json", "Accept": "application/json" }, body: JSON.stringify(data) });
  if (!res.ok) throw new Error("Не удалось создать комнату");
  const loc = res.headers.get("Location") || "";
  return loc.split("/").pop();
}
async function getBlob(id) {
  const res = await fetch(`${API_BASE}/${id}`, { headers: { "Accept": "application/json" } });
  if (!res.ok) return null;
  return await res.json();
}
async function updateBlob(id, data) {
  const res = await fetch(`${API_BASE}/${id}`, { method: "PUT", headers: { "Content-Type": "application/json", "Accept": "application/json" }, body: JSON.stringify(data) });
  if (!res.ok) throw new Error("Не удалось обновить");
  return true;
}

const SPHERES = {
  values:        { name: "Ценности и мировоззрение", color: "#c2410c", cls: "c-values" },
  household:     { name: "Быт и роли",                color: "#a16207", cls: "c-household" },
  finances:      { name: "Финансы",                   color: "#15803d", cls: "c-finances" },
  intimacy:      { name: "Близость и секс",           color: "#be185d", cls: "c-intimacy" },
  communication: { name: "Коммуникация и конфликты",  color: "#1d4ed8", cls: "c-communication" },
  emotional:     { name: "Эмоциональная поддержка",   color: "#7c2d92", cls: "c-emotional" },
  family:        { name: "Дети и семья",              color: "#b45309", cls: "c-family" },
  autonomy:      { name: "Личное пространство",       color: "#0f766e", cls: "c-autonomy" },
  leisure:       { name: "Досуг и развитие",          color: "#7c3aed", cls: "c-leisure" },
};

const QUESTIONS = [
  { id: 1, sphere: "values", type: "agree", text: "Долгосрочные отношения требуют постоянной осознанной работы, а не только чувств" },
  { id: 2, sphere: "values", type: "choice", text: "Что для тебя главный признак здоровых отношений?", options: ["Глубокое доверие", "Страсть и притяжение", "Общие цели и проекты", "Эмоциональная безопасность", "Свобода оставаться собой"] },
  { id: 3, sphere: "values", type: "agree", text: "Я готов(а) менять свои взгляды, если партнёр приведёт убедительные аргументы" },
  { id: 4, sphere: "household", type: "choice", text: "Как должны распределяться домашние обязанности?", options: ["50/50 поровну", "По способностям и желаниям", "Тот, кто меньше работает — больше дома", "Нанимаем помощь, если можем", "Чёткое разделение зон ответственности"] },
  { id: 5, sphere: "household", type: "agree", text: "Мне комфортно жить в порядке: вещи на местах, чистота поддерживается ежедневно" },
  { id: 6, sphere: "household", type: "choice", text: "Идеальное утро в выходной?", options: ["Подольше поспать вместе", "Встать рано, заняться делами", "Завтрак вне дома", "Каждый своим делом, потом вместе", "Спорт/прогулка с утра"] },
  { id: 7, sphere: "finances", type: "choice", text: "Как должен быть устроен семейный бюджет?", options: ["Полностью общий", "Общий + личные деньги у каждого", "Раздельный, скидываемся на общее", "Зарабатывает один — управляют вместе", "Гибко, по ситуации"] },
  { id: 8, sphere: "finances", type: "agree", text: "Крупные траты (от значимой для пары суммы) обязательно нужно обсуждать заранее" },
  { id: 9, sphere: "finances", type: "choice", text: "Что для тебя приоритет в финансах?", options: ["Накопления и подушка безопасности", "Инвестиции и рост капитала", "Качество жизни сейчас", "Свобода выбора и независимость", "Обеспечение детей и семьи"] },
  { id: 10, sphere: "intimacy", type: "agree", text: "Регулярная физическая близость критически важна для качества отношений" },
  { id: 11, sphere: "intimacy", type: "agree", text: "Мне важно открыто обсуждать с партнёром желания, фантазии и границы в сексе" },
  { id: 12, sphere: "intimacy", type: "choice", text: "Что для тебя важнее в близости?", options: ["Эмоциональная связь и нежность", "Страсть и физическое притяжение", "Игра, эксперимент, новизна", "Стабильность и предсказуемость", "Баланс всего понемногу"] },
  { id: 13, sphere: "communication", type: "choice", text: "Когда возникает конфликт, твой первый импульс?", options: ["Обсудить сразу, пока горячо", "Взять паузу, потом поговорить", "Уступить, чтобы сохранить мир", "Чётко обозначить позицию", "Понять чувства партнёра первым делом"] },
  { id: 14, sphere: "communication", type: "agree", text: "Я могу спокойно говорить партнёру о том, что мне не нравится, без обвинений" },
  { id: 15, sphere: "communication", type: "agree", text: "Молчание партнёра в ответ на мою попытку поговорить — это для меня серьёзная проблема" },
  { id: 16, sphere: "emotional", type: "choice", text: "Как ты чаще всего чувствуешь любовь от партнёра? (язык любви по Чепмену)", options: ["Слова поддержки и признания", "Качественное время вдвоём", "Подарки и знаки внимания", "Помощь и забота в делах", "Прикосновения и физическая близость"] },
  { id: 17, sphere: "emotional", type: "agree", text: "Когда мне плохо, я хочу, чтобы партнёр сначала выслушал, а не сразу предлагал решения" },
  { id: 18, sphere: "emotional", type: "agree", text: "Я легко делюсь с партнёром страхами, сомнениями и слабостями" },
  { id: 19, sphere: "family", type: "choice", text: "Какова твоя позиция по детям?", options: ["Хочу детей — это приоритет", "Хочу детей, но не сейчас", "Один ребёнок — оптимально", "Большая семья (3+)", "Не хочу детей или сомневаюсь"] },
  { id: 20, sphere: "family", type: "agree", text: "Активное участие родителей и родственников в нашей жизни — это нормально и хорошо" },
  { id: 21, sphere: "autonomy", type: "agree", text: "Мне нужно регулярное время в одиночестве, чтобы восстанавливаться" },
  { id: 22, sphere: "autonomy", type: "choice", text: "Сколько времени в неделю комфортно проводить отдельно от партнёра?", options: ["Почти всё свободное время — вместе", "Несколько часов в день — раздельно", "Один-два вечера в неделю — свои", "Регулярные свои выезды/хобби", "Очень много автономии важно"] },
  { id: 23, sphere: "leisure", type: "choice", text: "Идеальный отпуск вдвоём?", options: ["Активный — горы, треккинг, спорт", "Культурный — города, музеи, рестораны", "Расслабленный — пляж, спа, ничего не делать", "Экстрим и приключения", "Творческий ретрит / обучение / развитие"] },
  { id: 24, sphere: "leisure", type: "agree", text: "Мне важно, чтобы партнёр развивался, рос и учился новому" },
  { id: 25, sphere: "leisure", type: "choice", text: "Что бы ты хотел(а) делать с партнёром регулярно?", options: ["Путешествовать", "Заниматься спортом/здоровьем", "Делать совместный проект/бизнес", "Учиться чему-то новому", "Просто проводить время в тишине"] },
];

function scoreQuestion(q, a, b) {
  if (a == null || b == null) return 0;
  if (q.type === "agree") return 1 - Math.abs(a - b) / 4;
  if (q.type === "choice") return a === b ? 1 : 0;
  return 0;
}
function calculateResults(answersA, answersB) {
  const sphereScores = {}, sphereCounts = {}, perQuestion = [];
  for (const q of QUESTIONS) {
    const score = scoreQuestion(q, answersA[q.id], answersB[q.id]);
    sphereScores[q.sphere] = (sphereScores[q.sphere] || 0) + score;
    sphereCounts[q.sphere] = (sphereCounts[q.sphere] || 0) + 1;
    perQuestion.push({ q, score, a: answersA[q.id], b: answersB[q.id] });
  }
  const spherePercents = {};
  for (const key of Object.keys(sphereScores)) spherePercents[key] = Math.round((sphereScores[key] / sphereCounts[key]) * 100);
  const weights = { values: 1.4, communication: 1.4, intimacy: 1.2, family: 1.2, finances: 1.1, emotional: 1.1, household: 0.9, autonomy: 0.9, leisure: 0.8 };
  let weightedSum = 0, weightTotal = 0;
  for (const key of Object.keys(spherePercents)) { weightedSum += spherePercents[key] * (weights[key] || 1); weightTotal += (weights[key] || 1); }
  const overall = Math.round(weightedSum / weightTotal);
  const matches = perQuestion.filter(x => x.score >= 0.85).map(x => x.q);
  const gaps = perQuestion.filter(x => x.score < 0.4).map(x => ({ q: x.q, a: x.a, b: x.b }));
  return { overall, spherePercents, matches, gaps };
}
function getRecommendations(spherePercents) {
  const sorted = Object.entries(spherePercents).sort((a, b) => a[1] - b[1]);
  const weakest = sorted.slice(0, 2);
  const tips = {
    values: "Раз в месяц проводите 'разговор о смыслах' — час без телефонов о том, что для каждого из вас важно прямо сейчас и куда вы движетесь.",
    household: "Сделайте честный аудит домашних дел: выпишите всё, что делается в доме, и распределите явно. Невидимый труд — главный источник тихой обиды.",
    finances: "Заведите ежемесячную 'финансовую встречу' на 30 минут: бюджет, крупные планы, тревоги. Деньги — самая частая тема разводов, но самая решаемая через регулярность.",
    intimacy: "Обсудите вне постели: что нравится, чего хочется больше, что не работает. У большинства пар проблема не в сексе, а в страхе про него говорить.",
    communication: "Освойте технику Готтмана: начинайте сложный разговор мягко ('Я чувствую X, когда происходит Y'), а не с обвинения. Первые 3 минуты разговора предсказывают его исход.",
    emotional: "Если языки любви разные — каждый говорит на своём, а партнёр не слышит. Один день в неделю осознанно проявляйте любовь так, как её воспринимает партнёр, а не вы.",
    family: "Чёткие договорённости про границы с родителями и про детей лучше делать на берегу. Это не цинизм, а уважение к будущему вас обоих.",
    autonomy: "Договоритесь о 'своём времени' явно: сколько часов в неделю каждому нужно одному и как это устроить без чувства вины.",
    leisure: "Раз в квартал планируйте что-то, что хочет один из вас и что не очевидно для другого. Совместный новый опыт сильнее сближает, чем привычный.",
  };
  const recs = [];
  for (const [sphere] of weakest) if (tips[sphere]) recs.push({ sphere: SPHERES[sphere].name, text: tips[sphere], color: SPHERES[sphere].color });
  recs.push({ sphere: "Главное", text: "Совместимость — не приговор и не гарантия. Готтман показал: счастливые пары не отличаются отсутствием разногласий, они отличаются тем, как с ними обращаются. Используйте этот разбор как карту, а не как диагноз.", color: "#be185d" });
  return recs;
}

function html(strings, ...values) { return strings.reduce((acc, s, i) => acc + s + (values[i] !== undefined ? values[i] : ""), ""); }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function render() {
  if (state.stage === "landing") return renderLanding();
  if (state.stage === "room_ready") return renderRoomReady();
  if (state.stage === "quiz") return renderQuiz();
  if (state.stage === "waiting_finish") return renderWaiting();
  if (state.stage === "results") return renderResults();
}

window.app_setMode = (mode) => { landingMode = mode; render(); };
function showInputError(msg) { const el = document.getElementById("error-here"); if (el) el.innerHTML = `<div class="error-msg">${escapeHtml(msg)}</div>`; }
window.app_handleCreate = async () => {
  const name = document.getElementById("create-name").value.trim();
  if (!name) { showInputError("Введи имя"); return; }
  const btn = document.getElementById("create-submit");
  btn.disabled = true; btn.innerHTML = "Создаём...";
  try {

    setHashRoom(id); state.stage = "room_ready"; landingMode = null; render();

window.app_handleJoin = async () => {
  const name = document.getElementById("join-name").value.trim();
  const codeRaw = document.getElementById("join-code").value.trim();
  if (!name) { showInputError("Введи имя"); return; }
  if (!codeRaw) { showInputError("Введи код или вставь ссылку"); return; }
  await joinRoom(extractBlobId(codeRaw), name);
};
window.app_handleJoinByLink = async () => {
  const name = document.getElementById("join-name").value.trim();
  if (!name) { showInputError("Введи имя"); return; }
  const id = getHashRoom();
  if (!id) { showInputError("Ссылка некорректна"); return; }
  await joinRoom(id, name);
};
async function joinRoom(id, name) {
  try {
    const data = await getBlob(id);
    if (!data) { showInputError("Комната не найдена. Проверь код."); return; }
    const existing = data.players.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
    if (existing >= 0) {
      state.blobId = id; state.me = { name: data.players[existing].name, slot: existing }; state.room = data;
      setHashRoom(id);
      if (data.players[existing].done) {
        if (data.players.length === 2 && data.players.every(p => p.done)) state.stage = "results";
        else { state.stage = "waiting_finish"; startPolling(); }
      } else {
        state.answers = data.players[existing].answers || {};
        state.questionIdx = Object.keys(state.answers).length;
        if (state.questionIdx >= QUESTIONS.length) state.questionIdx = QUESTIONS.length - 1;
        state.stage = "quiz";
      }
      render(); return;
    }
    if (data.players.length >= 2) { showInputError("В этой комнате уже два участника"); return; }
    const updated = { ...data, players: [...data.players, { name, answers: {}, done: false }] };
    await updateBlob(id, updated);
    state.blobId = id; state.me = { name, slot: 1 }; state.room = updated;
    state.answers = {}; state.questionIdx = 0;
    setHashRoom(id); state.stage = "quiz"; landingMode = null; render();
  } catch (e) { showInputError("Ошибка соединения. Попробуй ещё раз."); }
}

window.app_copyLink = async () => {
  try {
    await navigator.clipboard.writeText(getShareUrl());
    state.copied = true; render(); setTimeout(() => { state.copied = false; render(); }, 2000);
  } catch (e) {
    const ta = document.createElement("textarea"); ta.value = getShareUrl();
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    state.copied = true; render(); setTimeout(() => { state.copied = false; render(); }, 2000);
  }
};
window.app_shareLink = async () => {
  const url = getShareUrl();
  if (navigator.share) { try { await navigator.share({ title: "Тест на совместимость", text: "Давай пройдём тест на совместимость вместе", url }); } catch (e) {} }
  else window.app_copyLink();
};

function renderQuiz() {
  const idx = state.questionIdx, q = QUESTIONS[idx], sphere = SPHERES[q.sphere];
  const progress = (idx / QUESTIONS.length) * 100;
  let inputHtml = "";
  if (q.type === "agree") {
    const current = state.answers[q.id];
    inputHtml = html`
      <div class="scale-labels"><span>не согласен(а)</span><span>согласен(а)</span></div>
      <div class="scale">${[1,2,3,4,5].map(n => html`<button class="scale-btn ${current === n ? "active" : ""}" onclick="window.app_choose(${n})">${n}</button>`).join("")}</div>`;
  } else if (q.type === "choice") {
    const current = state.answers[q.id];
    inputHtml = html`<div class="choice-list">${q.options.map((opt, i) => html`<button class="choice-btn ${current === i ? "active" : ""}" onclick="window.app_choose(${i})">${escapeHtml(opt)}</button>`).join("")}</div>`;
  }
  app.innerHTML = html`
    <div class="progress-meta"><span class="sphere-tag ${sphere.cls}">${escapeHtml(sphere.name)}</span><span>${idx + 1} / ${QUESTIONS.length}</span></div>

    <div class="fade-up" key="${idx}">
      <div class="card question-card">
        <div class="hand">вопрос ${idx + 1}</div>
        <h2 class="question-text">${escapeHtml(q.text)}</h2>

window.app_choose = async (val) => {
  const q = QUESTIONS[state.questionIdx];
  state.answers[q.id] = val; render();
  setTimeout(async () => {
    if (state.questionIdx === QUESTIONS.length - 1) await submitAnswers();
    else { state.questionIdx++; render(); }
  }, 220);
};
window.app_prevQuestion = () => { if (state.questionIdx > 0) { state.questionIdx--; render(); } };
async function submitAnswers() {
  app.innerHTML = html`<div class="card" style="text-align: center; padding: 60px 28px;"><div class="spinner"></div><p class="sans" style="color: var(--muted);">Сохраняем ответы...</p></div>`;
  try {
    const fresh = await getBlob(state.blobId);
    if (!fresh) throw new Error("not found");
    fresh.players[state.me.slot] = { ...fresh.players[state.me.slot], answers: state.answers, done: true };
    await updateBlob(state.blobId, fresh);
    state.room = fresh;
    if (fresh.players.length === 2 && fresh.players.every(p => p.done)) state.stage = "results";
    else { state.stage = "waiting_finish"; startPolling(); }
    render();
  } catch (e) {
    app.innerHTML = html`<div class="card" style="text-align: center;"><p>Не удалось сохранить ответы. Проверь соединение.</p><button class="btn-primary" onclick="window.app_retrySubmit()" style="margin-top: 16px;">Повторить</button></div>`;

}

function startPolling() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.pollTimer = setInterval(async () => {
    try {
      const fresh = await getBlob(state.blobId);
      if (!fresh) return;
      state.room = fresh;
      if (fresh.players.length === 2 && fresh.players.every(p => p.done)) {
        clearInterval(state.pollTimer); state.pollTimer = null;
        state.stage = "results"; render();
      } else if (state.stage === "waiting_finish") render();
    } catch (e) {}
  }, 5000);
}

function interpret(p) {
  if (p >= 85) return { label: "Удивительно высокая", color: "#15803d" };
  if (p >= 70) return { label: "Сильная", color: "#65a30d" };
  if (p >= 55) return { label: "Хорошая с зонами роста", color: "#c2410c" };
  if (p >= 40) return { label: "Смешанная — есть над чем работать", color: "#b45309" };
  return { label: "Много расхождений", color: "#9f1239" };
}

      <div class="card">
        <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">Что под капотом</h3>
        <p class="sans" style="font-size: 13px; color: var(--muted); line-height: 1.6;">Вопросы построены на работе Джона Готтмана (40 лет лонгитюдных исследований пар), модели PREPARE/ENRICH Дэвида Олсона, концепции «языков любви» Гэри Чепмена и теории привязанности. Сферы взвешены по силе предсказательной валидности: ценности, коммуникация и интимность вносят больший вклад, чем досуг или быт. Это инструмент для разговора, а не диагноз.</p>
      </div>
      <div class="footer-action"><button class="btn-pill" onclick="window.app_restart()">${ICONS.rotate} <span>Новый тест</span></button></div>
    </div>`;
}
window.app_restart = () => {
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.stage = "landing"; state.blobId = null; state.me = null; state.room = null;
  state.answers = {}; state.questionIdx = 0; landingMode = null;
  setHashRoom(null); render();
};

function getHashRoom() { const m = window.location.hash.match(/room=([a-zA-Z0-9_-]+)/); return m ? m[1] : null; }
function setHashRoom(id) {
  if (id) { if (window.history.replaceState) window.history.replaceState(null, "", "#room=" + id); else window.location.hash = "room=" + id; }
  else { if (window.history.replaceState) window.history.replaceState(null, "", window.location.pathname + window.location.search); }
}
function getShareUrl() { return window.location.origin + window.location.pathname + "#room=" + state.blobId; }
function extractBlobId(input) {
  const hashMatch = input.match(/[#&]room=([a-zA-Z0-9_-]+)/);
  if (hashMatch) return hashMatch[1];
  const urlMatch = input.match(/jsonBlob\/([a-zA-Z0-9_-]+)/);
  if (urlMatch) return urlMatch[1];
  return input.trim();
}

render();
</script>
